/div></span><p></p><p>基于某些过早的文章内容可能有误，有可能会踩坑，关于这个请自行甄别~,（有很大一部分原因是这些文章都是边踩坑边写的,可能各种遇到的问题不一致。</p></div><div style="display:flex;align-items:center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM11 11V17H13V11H11ZM11 7V9H13V7H11Z" fill="#0078e7"></path></svg><span style="margin-left:4px">OK</span></div><p>建立于2021年年初，直至今日,平常主要写一些<s>不知道什么东西</s>。<strong>反正主打就是一个杂乱</strong></p><h4 id="站点到现在主要更新下面的内容" tabindex="-1">站点到现在主要更新下面的内容 <a aria-current="page" href="/about/site#站点到现在主要更新下面的内容" class="router-link-active router-link-exact-active header-anchor" aria-label="Permalink to &quot;站点到现在主要更新下面的内容&quot;"><!--[-->​<!--]--></a></h4><hr><ul><li>Unity的渲染部分</li><li>偶尔有些C#代码（其实还是Unity）</li><li>制作本站遇到的一些问题（包括markdown的一些语法—）</li><li>日常和工作相关？</li></ul><p><strong>反正总得来说可以算是一个<s>寄术类博客</s>吧！！</strong></p><hr><h4 id="为什么要建立这个博客" tabindex="-1">为什么要建立这个博客？ <a aria-current="page" href="/about/site#为什么要建立这个博客" class="router-link-active router-link-exact-active header-anchor" aria-label="Permalink to &quot;为什么要建立这个博客？&quot;"><!--[-->​<!--]--></a></h4><p>起初是因为我发现需要一个东西来进行知识管理，在往年中学习的东西自己一忘再忘，想着肯定要搞点什么东西来记录一下。在寻找的过程中，我用了各种的</p><p>知识管理软件，它们每一款都有自己的特点。最后结合着自身情况，选择了搭建一个博客用来写一些比较重要的内容，剩下的记录在OneNote下。在博客上的内容</p><p>，有非常好的观赏性，写博客的过程中也能够让自己更好的记住这些知识，另外也方便自己分享出来，让别的朋友偶遇一下呢？</p><hr><h4 id="历程" tabindex="-1">历程 <a aria-current="page" href="/about/site#历程" class="router-link-active router-link-exact-active header-anchor" aria-label="Permalink to &quot;历程&quot;"><!--[-->​<!--]--></a></h4><blockquote><ul><li>2021年五月十一日建立，最初的框架为Hexo框架下的yun主题。</li><li>2022年年中因为工作和个人原因（<strong>懒狗</strong>）停止了对一些技术的学习，博客也暂时搁置。</li><li>2023年四月，重新开始整理博客， 博客更新为Valaxy框架，后续打算很长一段时间都会是它。</li></ul></blockquote><!--]--><!--[--><!--]--><!--]--><!----><!----></article></template><!--]--><!--[--><!--]--></div><!--]--><!----></div><!--[--><!--]--><!--[--><div class="post-nav"><div cl
