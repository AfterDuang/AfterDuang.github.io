-genderless-line icon w-8 h-8"></div><!--]--></a><a href="/girls/" class="link-item yun-icon-btn" inline-flex="" title="喜欢的女孩子" style="color:#ff69b4"><!--[--><div class="i-ri-women-line icon w-8 h-8"></div><!--]--></a><a href="/myweb/" class="link-item yun-icon-btn" inline-flex="" title="好用的网站" style="color:orange"><!--[--><div class="i-ri-cloud-line icon w-8 h-8"></div><!--]--></a><!--]--></div><br></div><div><button class="yun-icon-btn" title="切换深色模式" style="color:#f1cb64"><div i="ri-sun-line dark:ri-moon-line"></div></button><button class="yun-icon-btn" title="切换语言" style="color:var(--va-c-text)"><div i-ri-translate="" class="transition transform"></div></button></div><!--]--></div></aside><!--]--><main class="yun-main md:pl-$va-sidebar-width lt-md:ml-0" flex="~"><div w="full" flex="~"><!--[--><div class="content" flex="~ col grow" w="full" p="l-4 lt-md:0"><div class="yun-card flex-center rounded relative" flex="col" min-h="100px" bg="$va-c-bg-light" m="0" style=""><!----><!----><!--[--><!--[--><header class="post-header mb-2" m="t-16 sm:t-6"><h1 class="post-title flex-center" p="2" text="2xl center" font="serif black" style=""><div m="r-1 t-1px" inline-flex="" class="icon-pushpin-line icon"></div><span inline-flex="" class="leading-none">关于我自己</span></h1></header><!--]--><!--[--><!--]--><div p="x-4 b-8" class="sm:px-6 lg:px-12 xl:px-16" w="full"><!--[--><template><article class="markdown-body"><!--[--><!----><!----><!--[--><div style="display:flex;align-items:center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM11 11V17H13V11H11ZM11 7V9H13V7H11Z" fill="#0078e7"></path></svg><span style="margin-left:4px"><b>2023年3月24日，博客正式更新为Valaxy框架，由于这个页面有些是CSS写的，而且比较萌新，所以预览可能会出一点问题，建议电脑全屏</b></span></div><br><div style=""><img src="/images/Bg_Brig.png" alt="一个红发美少女，她是谁呢？" width="" height="" style="margin-left:0"></div><div style="position:absolute;left:500px;top:86px;white-space:nowrap"><p style="margin-left:10px"></p><h2>🌋也许~我根本不了解自己呢？</h2><p></p><p style="margin-left:10px"><b>  本职工作是半个PV师，半个三维人。做一点卡通视频，宣发pv啥的。业余就喜欢乱研究一些没用的东西，<br>比如这个博客大概就是这么来的。为什么说是大概呢？ 因为最开始因为在自己学习技术的过程中，随着技<br>术栈的不断扩大，逐渐开始需要一个来做知识管理的笔记。最初的笔记我全部写在了OneNote上，因为<br>OneNote非常方便进行三端同步，不管在哪里都能很好的查看文档。但到我从学习了Houdini和Unity之后。<br>事情就发生了变化。我接触到了一些代码，和数学相关的知识，误打误撞的进入了一些技术佬自己写的博客，<br>初次看见的时候发现这真是个好东西啊，居然能在页面上写公式，而且能帮文章很好的分类，做出来的版式也<br>赏心悦目，于是，便找了一个hexo的主题开始研究了。逐渐就有了现在这个样子。</b></p><h5>💦反正就是喜欢学些没什么用的东西！！</h5><hr><p style="margin-left:10px"><b>  不记得是从什么时候开始了,因为平常制作的视频中，经常会用到一些3D镜头，这些镜头有两种情况<br></b></p><li style="margin-left:40px"><b>动效方向</b></li><li style="margin-left:40px"><b>渲染方向</b></li><b>这两种情况对应的制作方案有非常多，例如houdini和Unity等。在这个各种工具都飞快迭代的今天，想要<br>做出自己的目标效果，所需要掌握的技术栈越也会来越大，虽然说它们也尽量的在提高易用性和降低使用门槛，<br>但是为了更更好的自定义各种细节，还是会开放出很多的接口来让用户更加细致的控制效果，比如现在3D软件<br>中共有的python脚本。在研究这些更加细节的东西的时候，就很容易被里面的底层给绕进去，不停的研究一些<br>渲染方法，api库啥的。最终为了实现一个效果往往会花上过多的成本，时间也这么就过去了。<br>但是怎么说呢？<u style="color:#4169e1">谁又不想把自己脑袋里面的无数想法给做出来呢？</u>😇</b><p></p></div><span style="color:gray;font-style:italic">图片原作者：©yeurei</span><hr><h3 id="结束力" tabindex="-1">结束力！！！ <a aria-current="page" href="/about#结束力" class="router-link-active router-link-exact-active header-anchor" aria-label="Permalink to &quot;结束力！！！&quot;"><!--[-->​<!--]--></a></h3><p><strong>来都来了，先来听一首歌吧~虽然和本文没啥关系</strong></p><meting-js id="1810759765" server="netease" type="song" theme="#C20C0C"></meting-js><!--]--><!--[--><!--]--><!--]--><!----><!----></article></template><!--]--><!--[--><!--]--></div><!--]--><!----></div><!--[--><!--]--><!--[--><div class="post-nav"><div class="post-nav-item"><!----></div><div class="post-nav-item"><a href="/posts/hello-valaxy" class="post-nav-next" title="博客升级至Valaxy框架"><span class="title truncate" text="sm">博客升级至Valaxy框架</span><div class="icon" i-ri-arrow-right-s-line=""></div></a></div></div><!--]--><!--[--><!--]--><!--[--><div class="yun-card flex-center rounded com
